fail_fast: false

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff check with autofix
        entry: uv run ruff check --fix
        language: system
        types_or:
          - python
          - pyi

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format
        language: system
        types_or:
          - python
          - pyi

      - id: check-secrets
        name: Check secrets
        entry: uv run python scripts/check_secrets.py
        language: system
        pass_filenames: false
        always_run: true
